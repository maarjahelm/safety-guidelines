<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Workplace Safety Guidelines</title>
<style>
/* ============================================================================
   Kalep Design System — colors + type
   Source: kalep-tailwind/token-css (default Bolt theme, light + dark).
   Architecture: global primitives → semantic tokens → semantic roles.
   Primary brand color: Bolt green (#2A9C64).
   ============================================================================ */

/* ---------- Fonts ---------- */



/* ---------- Primitive (core) color tokens ---------- */
:where(:root) {
  --color-core-white: #ffffff;
  --color-core-black: #000000;
  --color-core-brand-green: #2A9C64;
  --color-core-brand-green-dark: #0C2C1C;

  /* Green scale on light (1..12) — brand */
  --color-core-green-1: rgba(251, 254, 252, 1);
  --color-core-green-3: rgba(231, 246, 237, 1);
  --color-core-green-5: rgba(200, 231, 212, 1);
  --color-core-green-7: rgba(152, 203, 172, 1);
  --color-core-green-9: rgba(43, 134, 89, 1);
  --color-core-green-10: rgba(24, 120, 76, 1);
  --color-core-green-11: rgba(20, 123, 81, 1);
  --color-core-green-12: rgba(8, 31, 20, 1);

  /* Red (danger) */
  --color-core-red-3: rgba(255, 234, 234, 1);
  --color-core-red-5: rgba(255, 205, 205, 1);
  --color-core-red-9: rgba(222, 25, 41, 1);
  --color-core-red-10: rgba(206, 0, 25, 1);
  --color-core-red-11: rgba(178, 15, 28, 1);

  /* Yellow (warning) */
  --color-core-yellow-3: rgba(255, 240, 197, 1);
  --color-core-yellow-5: rgba(255, 219, 144, 1);
  --color-core-yellow-9: rgba(255, 178, 0, 1);
  --color-core-yellow-10: rgba(255, 161, 0, 1);

  /* Purple (promo / map-driving) */
  --color-core-purple-3: rgba(238, 242, 255, 1);
  --color-core-purple-9: rgba(89, 102, 243, 1);
  --color-core-purple-10: rgba(79, 91, 218, 1);
  --color-core-purple-11: rgba(68, 19, 217, 1);

  /* Sage (neutrals) */
  --color-core-sage-1: rgba(251, 253, 252, 1);
  --color-core-sage-3: rgba(238, 241, 240, 1);
  --color-core-sage-5: rgba(222, 226, 225, 1);
  --color-core-sage-7: rgba(203, 207, 206, 1);
  --color-core-sage-9: rgba(134, 142, 139, 1);
  --color-core-sage-11: rgba(95, 101, 99, 1);
  --color-core-sage-12: rgba(25, 31, 28, 1);

  /* Black alpha scale */
  --color-core-black-alpha-3: rgba(0, 0, 0, 0.06);
  --color-core-black-alpha-5: rgba(0, 0, 0, 0.12);
  --color-core-black-alpha-9: rgba(0, 0, 0, 0.45);
  --color-core-black-alpha-12: rgba(0, 0, 0, 0.88);
}

/* ---------- Semantic tokens — light (Rider/default) ---------- */
:where(:root, [data-mode="light"]) {
  /* Layers */
  --color-layer-floor-0: #ffffff;
  --color-layer-floor-0-grouped: rgba(238, 241, 240, 1);
  --color-layer-floor-1: #ffffff;
  --color-layer-floor-2: #ffffff;
  --color-layer-floor-3: #ffffff;
  --color-layer-surface: rgba(0, 45, 30, 0.07);

  /* Content */
  --color-content-primary: rgba(25, 31, 28, 1);
  --color-content-secondary: rgba(0, 10, 7, 0.63);
  --color-content-tertiary: rgba(0, 17, 11, 0.47);
  --color-content-action-primary: rgba(0, 112, 66, 0.92);
  --color-content-action-secondary: rgba(0, 110, 55, 0.83);
  --color-content-danger-primary: rgba(173, 0, 14, 0.94);
  --color-content-warning-primary: rgba(158, 91, 0, 1);
  --color-content-positive-primary: rgba(0, 112, 66, 0.92);
  --color-content-promo-primary: rgba(56, 4, 215, 0.94);
  --color-content-link-primary: rgba(0, 112, 66, 0.92);
  --color-content-primary-inverted: rgba(253, 255, 254, 0.93);

  /* Backgrounds */
  --color-bg-neutral-primary: rgba(14, 16, 16, 1);
  --color-bg-neutral-secondary: rgba(0, 45, 30, 0.07);
  --color-bg-action-primary: rgba(43, 134, 89, 1);
  --color-bg-action-secondary: rgba(0, 160, 64, 0.09);
  --color-bg-danger-primary: rgba(222, 25, 41, 1);
  --color-bg-danger-secondary: rgba(255, 0, 0, 0.08);
  --color-bg-warning-primary: rgba(255, 178, 0, 1);
  --color-bg-warning-secondary: rgba(255, 190, 0, 0.23);
  --color-bg-positive-primary: rgba(43, 134, 89, 1);
  --color-bg-promo-primary: rgba(89, 102, 243, 1);
  --color-bg-promo-secondary: rgba(0, 60, 255, 0.07);

  /* Active (pressed) */
  --color-bg-active-action-primary: rgba(24, 120, 76, 1);
  --color-bg-active-neutral-secondary: rgba(0, 31, 24, 0.13);

  /* Borders */
  --color-border-neutral-primary: rgba(0, 17, 11, 0.47);
  --color-border-neutral-secondary: rgba(0, 20, 13, 0.16);
  --color-border-separator: rgba(0, 45, 30, 0.07);
  --color-border-action-primary: rgba(43, 134, 89, 1);

  /* Special */
  --color-special-scrim: rgba(0, 0, 0, 0.28);
  --color-special-brand: #2A9C64;
  --color-special-brand-alt: #0C2C1C;
  --color-special-bg-disabled: rgba(0, 45, 30, 0.07);
}

/* ---------- Semantic tokens — dark ---------- */
:where([data-mode="dark"]) {
  --color-layer-floor-0: #000000;
  --color-layer-floor-0-grouped: #000000;
  --color-layer-floor-1: rgba(14, 16, 16, 1);
  --color-layer-floor-2: rgba(22, 26, 24, 1);
  --color-layer-floor-3: rgba(32, 34, 33, 1);
  --color-layer-surface: rgba(244, 246, 233, 0.08);

  --color-content-primary: rgba(236, 238, 237, 1);
  --color-content-secondary: rgba(244, 254, 249, 0.69);
  --color-content-tertiary: rgba(229, 253, 245, 0.46);
  --color-content-action-primary: rgba(119, 248, 176, 0.96);
  --color-content-danger-primary: rgba(255, 159, 148, 1);
  --color-content-warning-primary: rgba(255, 191, 53, 1);
  --color-content-positive-primary: rgba(119, 248, 176, 0.96);
  --color-content-promo-primary: rgba(178, 183, 255, 0.98);
  --color-content-link-primary: rgba(119, 248, 176, 0.96);
  --color-content-primary-inverted: rgba(25, 31, 28, 1);

  --color-bg-neutral-primary: rgba(251, 253, 252, 1);
  --color-bg-neutral-secondary: rgba(244, 246, 233, 0.08);
  --color-bg-action-primary: rgba(43, 134, 89, 1);
  --color-bg-action-secondary: rgba(0, 255, 110, 0.12);
  --color-bg-danger-primary: rgba(222, 25, 41, 1);
  --color-bg-danger-secondary: rgba(254, 11, 6, 0.2);
  --color-bg-warning-primary: rgba(255, 178, 0, 1);
  --color-bg-warning-secondary: rgba(255, 133, 0, 0.14);
  --color-bg-positive-primary: rgba(43, 134, 89, 1);
  --color-bg-promo-primary: rgba(89, 102, 243, 1);
  --color-bg-promo-secondary: rgba(64, 81, 252, 0.26);

  --color-bg-active-action-primary: rgba(24, 120, 76, 1);
  --color-bg-active-neutral-secondary: rgba(241, 250, 243, 0.14);

  --color-border-neutral-primary: rgba(225, 253, 241, 0.4);
  --color-border-neutral-secondary: rgba(242, 255, 244, 0.18);
  --color-border-separator: rgba(244, 246, 233, 0.08);
  --color-border-action-primary: rgba(43, 134, 89, 1);

  --color-special-scrim: rgba(0, 0, 0, 0.48);
  --color-special-brand: #2A9C64;
  --color-special-brand-alt: #0C2C1C;
  --color-special-bg-disabled: rgba(244, 246, 233, 0.08);
}

/* ---------- Dimensions / spacing / radii ---------- */
:root {
  --dimension-50: 0.125rem;
  --dimension-100: 0.25rem;
  --dimension-150: 0.375rem;
  --dimension-200: 0.5rem;
  --dimension-300: 0.75rem;
  --dimension-400: 1rem;
  --dimension-500: 1.25rem;
  --dimension-600: 1.5rem;
  --dimension-800: 2rem;
  --dimension-1000: 2.5rem;
  --dimension-1200: 3rem;
  --dimension-1600: 4rem;

  --corner-radius-xs: 0.25rem;
  --corner-radius-s: 0.5rem;
  --corner-radius-m: 0.75rem;
  --corner-radius-l: 1rem;
  --corner-radius-xl: 1.5rem;
  --corner-radius-full: 600rem;

  --size-icon-xs: 1rem;
  --size-icon-s: 1.25rem;
  --size-icon-m: 1.5rem;
  --size-icon-l: 2rem;

  --size-comp-s-min-height: 2.25rem;
  --size-comp-m-min-height: 3rem;
  --size-comp-l-min-height: 3.5rem;

  --layout-hr-screen-margin: 1.5rem;
  --layout-between-sections: 0.5rem;

  /* Shadows — Kalep uses very subtle shadows; most surfaces rely on layers */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
  --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.12);
  --shadow-floating: 0 4px 12px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-bottom-sheet: 0 -4px 24px rgba(0, 0, 0, 0.12);
}

/* ---------- Type scale (utility classes, Inter variable) ----------
   "accent" = semibold-ish (weight 650), "regular" = 450.
   Kalep uses variable opsz matching the pt size + feature settings cv03, cv04. */
.bolt-font-base {
  font-family: "InterVariable", Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
  font-feature-settings: "cv03", "cv04", "liga" 1, "calt" 1;
  -webkit-font-smoothing: antialiased;
}
.bolt-font-display-m-regular { font: 450 3rem/3.75rem "InterVariable", sans-serif; letter-spacing: -0.022em; font-variation-settings: "opsz" 32; font-feature-settings: "cv03","cv04"; }
.bolt-font-heading-l-accent  { font: 650 2rem/2.5rem   "InterVariable", sans-serif; letter-spacing: -0.022em; font-variation-settings: "opsz" 32; font-feature-settings: "cv03","cv04"; }
.bolt-font-heading-m-accent  { font: 650 1.75rem/2.25rem "InterVariable", sans-serif; letter-spacing: -0.02em;  font-variation-settings: "opsz" 28; font-feature-settings: "cv03","cv04"; }
.bolt-font-heading-s-accent  { font: 650 1.5rem/1.875rem "InterVariable", sans-serif; letter-spacing: -0.019em; font-variation-settings: "opsz" 24; font-feature-settings: "cv03","cv04"; }
.bolt-font-heading-xs-accent { font: 650 1.25rem/1.5625rem "InterVariable", sans-serif; letter-spacing: -0.017em; font-variation-settings: "opsz" 20; font-feature-settings: "cv03","cv04"; }
.bolt-font-body-l-regular    { font: 450 1.125rem/1.5rem "InterVariable", sans-serif; letter-spacing: -0.014em; font-variation-settings: "opsz" 18; font-feature-settings: "cv03","cv04"; }
.bolt-font-body-l-accent     { font: 650 1.125rem/1.5rem "InterVariable", sans-serif; letter-spacing: -0.014em; font-variation-settings: "opsz" 18; font-feature-settings: "cv03","cv04"; }
.bolt-font-body-m-regular    { font: 450 1rem/1.5rem "InterVariable", sans-serif; letter-spacing: -0.011em; font-variation-settings: "opsz" 16; font-feature-settings: "cv03","cv04"; }
.bolt-font-body-m-accent     { font: 650 1rem/1.5rem "InterVariable", sans-serif; letter-spacing: -0.011em; font-variation-settings: "opsz" 16; font-feature-settings: "cv03","cv04"; }
.bolt-font-body-s-regular    { font: 450 0.875rem/1.25rem "InterVariable", sans-serif; letter-spacing: -0.006em; font-variation-settings: "opsz" 14; font-feature-settings: "cv03","cv04"; }
.bolt-font-body-s-accent     { font: 650 0.875rem/1.25rem "InterVariable", sans-serif; letter-spacing: -0.006em; font-variation-settings: "opsz" 14; font-feature-settings: "cv03","cv04"; }
.bolt-font-body-xs-regular   { font: 450 0.75rem/1rem "InterVariable", sans-serif; letter-spacing: 0em; font-variation-settings: "opsz" 14; font-feature-settings: "cv03","cv04"; }
.bolt-font-body-xs-accent    { font: 650 0.75rem/1rem "InterVariable", sans-serif; letter-spacing: 0em; font-variation-settings: "opsz" 14; font-feature-settings: "cv03","cv04"; }
.bolt-font-caps-m-accent     { font: 650 0.875rem/1.125rem "InterVariable", sans-serif; letter-spacing: 0.074em; text-transform: uppercase; font-variation-settings: "opsz" 14; }
.bolt-font-caps-s-accent     { font: 650 0.6875rem/0.875rem "InterVariable", sans-serif; letter-spacing: 0.08em;  text-transform: uppercase; font-variation-settings: "opsz" 14; }
.bolt-font-tabular-m-regular { font: 450 1rem/1.5rem "InterVariable", sans-serif; letter-spacing: -0.026em; font-feature-settings: "tnum","cv03","cv04"; font-variation-settings: "opsz" 16; }
.bolt-font-tabular-m-accent  { font: 650 1rem/1.5rem "InterVariable", sans-serif; letter-spacing: -0.026em; font-feature-settings: "tnum","cv03","cv04"; font-variation-settings: "opsz" 16; }

/* ---------- Semantic HTML defaults ---------- */
html, body { background: var(--color-layer-floor-0); color: var(--color-content-primary); }
body {
  font-family: "InterVariable", Inter, system-ui, -apple-system, sans-serif;
  font-feature-settings: "cv03", "cv04", "liga" 1, "calt" 1;
  -webkit-font-smoothing: antialiased;
  margin: 0;
}
h1 { font: 650 2rem/2.5rem "InterVariable", sans-serif; letter-spacing: -0.022em; margin: 0; }
h2 { font: 650 1.75rem/2.25rem "InterVariable", sans-serif; letter-spacing: -0.02em; margin: 0; }
h3 { font: 650 1.5rem/1.875rem "InterVariable", sans-serif; letter-spacing: -0.019em; margin: 0; }
h4 { font: 650 1.25rem/1.5625rem "InterVariable", sans-serif; letter-spacing: -0.017em; margin: 0; }
p  { font: 450 1rem/1.5rem "InterVariable", sans-serif; letter-spacing: -0.011em; margin: 0; }
small { font: 450 0.875rem/1.25rem "InterVariable", sans-serif; letter-spacing: -0.006em; }
a  { color: var(--color-content-link-primary); text-decoration: none; }
a:hover { text-decoration: underline; }
code, kbd, pre { font-family: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace; font-size: 0.875em; }

/* Variation A styles */
.docA-root {
  display: flex;
  width: 100%;
  height: 100%;
  background: var(--color-layer-floor-0-grouped);
  color: var(--color-content-primary);
  overflow: hidden;
}
.docA-toc {
  width: 280px;
  flex-shrink: 0;
  background: var(--color-layer-floor-0);
  border-right: 1px solid var(--color-border-separator);
  padding: 28px 20px 20px;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}
.docA-toc-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
.docA-toc-brand-tag { font-size: 11px; font-weight: 650; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-content-secondary); }
.docA-toc-label { font-size: 11px; font-weight: 650; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-content-tertiary); margin-bottom: 10px; padding-left: 8px; }
.docA-toc-nav { display: flex; flex-direction: column; gap: 2px; }
.docA-toc-item {
  display: flex; align-items: baseline; gap: 12px;
  padding: 10px 8px; border: none; background: transparent; cursor: pointer;
  border-radius: 8px; text-align: left;
  font: 450 14px/1.35 "InterVariable", sans-serif;
  color: var(--color-content-secondary);
  transition: background 0.12s, color 0.12s;
}
.docA-toc-item:hover { background: var(--color-bg-neutral-secondary); }
.docA-toc-item.is-active { background: var(--color-bg-action-secondary); color: var(--color-content-action-primary); font-weight: 650; }
.docA-toc-num { font-variant-numeric: tabular-nums; font-size: 11px; opacity: 0.6; min-width: 18px; font-weight: 650; }
.docA-toc-t { flex: 1; }
.docA-toc-foot { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--color-border-separator); }
.docA-toc-meta { font-size: 12px; color: var(--color-content-tertiary); padding: 2px 8px; }

.docA-scroll { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
.docA-inner { max-width: 760px; margin: 0 auto; padding: 64px 72px 96px; }

/* Cover */
.docA-cover { margin-bottom: 72px; }
.docA-eyebrow { font-size: 12px; font-weight: 650; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-content-action-primary); margin-bottom: 20px; }
.docA-title { font: 650 56px/58px "InterVariable", sans-serif; letter-spacing: -0.028em; margin: 0 0 28px; font-variation-settings: "opsz" 48; }
.docA-lede { font: 450 18px/28px "InterVariable", sans-serif; color: var(--color-content-secondary); letter-spacing: -0.011em; max-width: 620px; margin: 0 0 36px; }
.docA-cover-meta {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;
  padding: 20px 0; border-top: 1px solid var(--color-border-separator); border-bottom: 1px solid var(--color-border-separator);
}
.docA-meta-k { font-size: 11px; font-weight: 650; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-content-tertiary); margin-bottom: 4px; }
.docA-meta-v { font-size: 15px; font-weight: 650; color: var(--color-content-primary); }

/* Section */
.docA-section { margin-bottom: 56px; scroll-margin-top: 24px; }
.docA-sec-head { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--color-border-separator); }
.docA-sec-num { font: 650 13px/1 "InterVariable", sans-serif; letter-spacing: 0.08em; color: var(--color-content-action-primary); font-variant-numeric: tabular-nums; min-width: 24px; }
.docA-sec-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--color-bg-action-secondary);
  color: var(--color-content-action-primary);
  display: flex; align-items: center; justify-content: center;
}
.docA-sec-title { font: 650 28px/32px "InterVariable", sans-serif; letter-spacing: -0.022em; margin: 0; flex: 1; }

.docA-p { font: 450 16px/26px "InterVariable", sans-serif; color: var(--color-content-primary); margin: 0 0 16px; letter-spacing: -0.011em; }
.docA-h { font: 650 16px/24px "InterVariable", sans-serif; color: var(--color-content-primary); margin: 24px 0 10px; }
.docA-ul { list-style: none; margin: 0 0 16px; padding: 0; }
.docA-ul li {
  position: relative;
  padding: 6px 0 6px 26px;
  font: 450 15px/24px "InterVariable", sans-serif;
  color: var(--color-content-secondary);
  letter-spacing: -0.006em;
}
.docA-ul-tight li { padding: 4px 0 4px 22px; font-size: 14px; line-height: 22px; }
.docA-bullet {
  position: absolute; left: 10px; top: 14px;
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--color-content-action-primary);
}
.docA-ul-tight .docA-bullet { left: 8px; top: 13px; }

.docA-callout {
  display: flex; gap: 14px;
  background: var(--color-bg-action-secondary);
  border-radius: var(--corner-radius-l);
  padding: 18px 20px;
  margin: 20px 0;
}
.docA-callout-icon { color: var(--color-content-action-primary); flex-shrink: 0; }
.docA-callout-title { font: 650 16px/22px "InterVariable", sans-serif; color: var(--color-content-action-primary); margin-bottom: 4px; }
.docA-callout-body { font: 450 14px/20px "InterVariable", sans-serif; color: var(--color-content-primary); }

/* QR block */
.docA-qr {
  display: grid; grid-template-columns: auto 1fr; gap: 18px; align-items: center;
  background: var(--color-layer-floor-1);
  border: 1px solid var(--color-border-separator);
  border-radius: var(--corner-radius-l);
  padding: 18px 20px;
  margin: 16px 0 24px;
}
.docA-qr-img {
  width: 120px; height: 120px;
  background: #fff;
  border-radius: var(--corner-radius-m);
  padding: 8px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--color-border-separator);
}
.docA-qr-img img { display: block; width: 100%; height: 100%; }
.docA-qr-label { font: 650 12px/1 "InterVariable", sans-serif; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-content-action-primary); margin-bottom: 8px; }
.docA-qr-caption { font: 450 14px/20px "InterVariable", sans-serif; color: var(--color-content-primary); margin-bottom: 8px; }
.docA-qr-link {
  font: 450 12px/16px "InterVariable", sans-serif;
  color: var(--color-content-secondary);
  word-break: break-all;
  text-decoration: none;
}
.docA-qr-link:hover { color: var(--color-content-action-primary); text-decoration: underline; }

/* Three-stage cards */
.docA-stages { display: flex; flex-direction: column; gap: 10px; margin: 16px 0 24px; }
.docA-stage {
  display: grid; grid-template-columns: 160px 1fr; gap: 20px;
  background: var(--color-layer-floor-1);
  border: 1px solid var(--color-border-separator);
  border-left: 3px solid var(--color-content-action-primary);
  border-radius: var(--corner-radius-m);
  padding: 18px 20px;
}
.docA-stage-head { padding-top: 2px; }
.docA-stage-num { display: block; font: 650 11px/1 "InterVariable", sans-serif; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-content-action-primary); margin-bottom: 5px; }
.docA-stage-when { font: 650 19px/24px "InterVariable", sans-serif; letter-spacing: -0.014em; }
.docA-stage-lead { font: 450 14px/20px "InterVariable", sans-serif; color: var(--color-content-secondary); margin-bottom: 4px; }
.docA-stage .docA-ul { margin-bottom: 0; }

/* GHS pictogram grid */
.docA-ghs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 16px 0 24px; }
.docA-ghs-item {
  text-align: center;
  background: var(--color-layer-floor-1);
  border: 1px solid var(--color-border-separator);
  border-radius: var(--corner-radius-m);
  padding: 18px 14px 16px;
}
.docA-ghs-pic { display: block; width: 72px; height: 72px; margin: 0 auto 12px; }
.docA-ghs-code { font: 650 11px/1 "InterVariable", sans-serif; letter-spacing: 0.06em; color: var(--color-content-tertiary); margin-bottom: 4px; }
.docA-ghs-name { font: 650 14px/18px "InterVariable", sans-serif; margin-bottom: 4px; }
.docA-ghs-desc { font: 450 12px/16px "InterVariable", sans-serif; color: var(--color-content-secondary); }

/* Hazards grid */
.docA-hazards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 16px 0 24px; }
.docA-hazard { background: var(--color-layer-floor-1); border-radius: var(--corner-radius-l); padding: 16px 18px; border: 1px solid var(--color-border-separator); }
.docA-hazard-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.docA-hazard-icon {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--color-bg-warning-secondary);
  color: var(--color-content-warning-primary);
  display: flex; align-items: center; justify-content: center;
}
.docA-hazard-title { font: 650 14px/20px "InterVariable", sans-serif; }

/* Footer */
.docA-foot { margin-top: 72px; }
.docA-foot-rule { height: 1px; background: var(--color-border-neutral-secondary); margin-bottom: 24px; }
.docA-foot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
.docA-foot-label { font-size: 11px; font-weight: 650; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-content-tertiary); margin-bottom: 6px; }
.docA-foot-body { font: 450 14px/20px "InterVariable", sans-serif; color: var(--color-content-secondary); }
.docA-sign-line { height: 2px; background: var(--color-content-primary); margin-bottom: 8px; width: 100%; }

/* Scrollbar restraint */
.docA-scroll::-webkit-scrollbar, .docA-toc::-webkit-scrollbar { width: 10px; }
.docA-scroll::-webkit-scrollbar-thumb, .docA-toc::-webkit-scrollbar-thumb { background: rgba(0,0,0,.12); border-radius: 5px; }

html, body, #root { height: 100%; margin: 0; }
body { background: #fbfdfc; }
